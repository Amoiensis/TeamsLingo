<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="options.pageTitle">TeamsLingo 配置</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1 data-i18n="options.headerTitle">TeamsLingo 配置</h1>
        <p data-i18n="options.headerDescription">配置 OpenAI-compatible API 后，在 Teams Web 会议中自动翻译实时字幕。</p>
      </header>

      <form id="settings-form" class="form">
        <label class="field field-inline">
          <input id="enabled" type="checkbox">
          <span data-i18n="options.enabled">启用自动翻译</span>
        </label>

        <div class="grid">
          <label class="field">
            <span data-i18n="options.uiLanguage">界面语言 / Interface language</span>
            <select id="uiLanguage">
              <option value="zh-CN" data-i18n="options.uiLanguageZh">中文 / Chinese</option>
              <option value="en" data-i18n="options.uiLanguageEn">English / 英文</option>
            </select>
          </label>

          <label class="field">
            <span data-i18n="options.panelTheme">浮动窗口外观</span>
            <select id="panelTheme">
              <option value="system" data-i18n="options.panelThemeSystem">自动跟随系统</option>
              <option value="dark" data-i18n="options.panelThemeDark">暗黑</option>
              <option value="light" data-i18n="options.panelThemeLight">明亮</option>
            </select>
          </label>
        </div>

        <div class="grid">
          <label class="field">
            <span data-i18n="options.provider">翻译服务</span>
            <select id="provider">
              <option value="openai">OpenAI-compatible / Poe</option>
              <option value="google">Google Translate</option>
              <option value="microsoft">Microsoft Translator</option>
            </select>
          </label>

          <label class="field provider-openai">
            <span data-i18n="options.apiFormat">API 格式</span>
            <select id="apiFormat">
              <option value="chat_completions">Chat Completions API</option>
              <option value="responses">Responses API</option>
            </select>
          </label>
        </div>

        <div class="grid">
          <label class="field">
            <span data-i18n="options.endpoint">API Endpoint 或 Base URL</span>
            <input id="endpoint" type="url" placeholder="https://api.openai.com/v1/chat/completions" autocomplete="off">
            <small id="endpointHelp" data-i18n="options.endpointHelpResponses">Responses API 可填 https://api.poe.com/v1，插件会自动请求 /responses。</small>
          </label>

          <label class="field provider-microsoft" hidden>
            <span data-i18n="options.microsoftRegion">Microsoft Region</span>
            <input id="microsoftRegion" type="text" placeholder="例如: eastus" autocomplete="off" data-i18n-placeholder="options.microsoftRegionPlaceholder">
            <small data-i18n="options.microsoftRegionHelp">区域资源或多服务资源需要填写；全局单服务 Translator 可留空。</small>
          </label>
        </div>

        <label class="field">
          <span data-i18n="options.apiKey">API Key</span>
          <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off">
          <small data-i18n="options.apiKeyHelp">Key 保存在此浏览器扩展的本地存储中。</small>
        </label>

        <label class="field provider-openai">
          <span data-i18n="options.model">Model</span>
          <input id="model" type="text" placeholder="gpt-4o-mini" autocomplete="off">
        </label>

        <div class="grid">
          <label class="field">
            <span data-i18n="options.sourceLanguage">源语言</span>
            <select id="sourceLanguageMode">
              <option value="auto" data-i18n="options.sourceModeAuto">根据字幕内容自动识别</option>
              <option value="fixed" data-i18n="options.sourceModeFixed">固定为 Teams 转写语言</option>
            </select>
            <select id="sourceLanguageSelect"></select>
            <input id="sourceLanguageCustom" class="custom-language" type="text" placeholder="例如: Japanese" autocomplete="off" hidden data-i18n-placeholder="options.sourceCustomPlaceholder">
            <small data-i18n="options.sourceHelp">自动识别会直接根据 Teams 实时字幕文本判断源语言。</small>
          </label>

          <label class="field">
            <span data-i18n="options.targetLanguage">目标语言</span>
            <select id="targetLanguageSelect"></select>
            <input id="targetLanguageCustom" class="custom-language" type="text" placeholder="例如: Simplified Chinese" autocomplete="off" hidden data-i18n-placeholder="options.targetCustomPlaceholder">
            <small data-i18n="options.targetHelp">下拉列表使用 Teams 实时翻译字幕支持的目标语言，也可以自定义。</small>
          </label>
        </div>

        <div class="grid">
          <label class="field">
            <span data-i18n="options.settleDelay">字幕稳定后翻译</span>
            <input id="settleDelayMs" type="number" min="500" max="6000" step="100">
            <small data-i18n="options.settleDelayHelp">单位毫秒；值越大越不容易翻译半句话。</small>
          </label>

          <label class="field">
            <span data-i18n="options.minChars">最短字幕长度</span>
            <input id="minChars" type="number" min="1" max="80" step="1">
          </label>
        </div>

        <div class="grid">
          <label class="field">
            <span data-i18n="options.maxItems">窗口保留条数</span>
            <input id="maxItems" type="number" min="5" max="100" step="1">
          </label>

          <label class="field field-inline align-bottom">
            <input id="processExistingOnStart" type="checkbox">
            <span data-i18n="options.processExistingOnStart">启动时翻译已有字幕</span>
          </label>
        </div>

        <div class="actions">
          <button type="submit" data-i18n="options.save">保存</button>
          <button id="test" type="button" class="secondary" data-i18n="options.test">测试翻译</button>
        </div>

        <div id="message" class="message" role="status" aria-live="polite"></div>
      </form>
    </main>
    <script src="ui-i18n.js"></script>
    <script src="languages.js"></script>
    <script src="options.js"></script>
  </body>
</html>
