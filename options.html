<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="options.pageTitle">TeamsLingo 配置</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div class="header-row">
          <img src="icons/icon128.png" alt="TeamsLingo" class="header-logo">
          <div>
            <h1 data-i18n="options.headerTitle">TeamsLingo 配置</h1>
            <p data-i18n="options.headerDescription">可直接免费使用 Google 翻译和微软翻译，也支持 OpenAI 兼容 API 与官方付费接口。</p>
          </div>
        </div>
      </header>

      <form id="settings-form" class="form">
        <label class="field field-inline">
          <input id="enabled" type="checkbox">
          <span data-i18n="options.enabled">启用自动翻译</span>
        </label>

        <div class="grid">
          <label class="field">
            <span data-i18n="options.uiLanguage">界面语言 / Interface language</span>
            <select id="uiLanguage">
              <option value="zh-CN" data-i18n="options.uiLanguageZh">中文 / Chinese</option>
              <option value="en" data-i18n="options.uiLanguageEn">English / 英文</option>
              <option value="ja" data-i18n="options.uiLanguageJa">日本語 / Japanese</option>
            </select>
          </label>

          <label class="field">
            <span data-i18n="options.panelTheme">浮动窗口外观</span>
            <select id="panelTheme">
              <option value="system" data-i18n="options.panelThemeSystem">自动跟随系统</option>
              <option value="dark" data-i18n="options.panelThemeDark">暗黑</option>
              <option value="light" data-i18n="options.panelThemeLight">明亮</option>
            </select>
          </label>
        </div>

        <div class="grid">
          <label id="providerField" class="field">
            <span data-i18n="options.provider">翻译服务</span>
            <select id="provider">
              <option value="openai" data-i18n="options.providerOpenAI">OpenAI 兼容 API / Poe</option>
              <option value="google" data-i18n="options.providerGoogle">Google 翻译</option>
              <option value="microsoft" data-i18n="options.providerMicrosoft">微软翻译</option>
            </select>
          </label>

          <label class="field provider-openai" hidden>
            <span data-i18n="options.apiFormat">API 格式</span>
            <select id="apiFormat">
              <option value="chat_completions">Chat Completions API</option>
              <option value="responses">Responses API</option>
            </select>
          </label>
        </div>

        <details id="providerAdvanced" class="provider-advanced" open>
          <summary data-i18n="options.advancedSettings">高级设置</summary>
          <div class="provider-advanced-body">
            <div class="grid">
              <label id="endpointField" class="field">
                <span data-i18n="options.endpoint">API Endpoint 或 Base URL</span>
                <input id="endpoint" type="url" placeholder="https://api.openai.com/v1/chat/completions" autocomplete="off">
                <small id="endpointHelp" data-i18n="options.endpointHelpResponses">Responses API 可填 https://api.poe.com/v1，插件会自动请求 /responses。</small>
              </label>

              <label class="field provider-microsoft" hidden>
                <span data-i18n="options.microsoftRegion">Microsoft Region</span>
                <input id="microsoftRegion" type="text" placeholder="例如: eastus" autocomplete="off" data-i18n-placeholder="options.microsoftRegionPlaceholder">
                <small data-i18n="options.microsoftRegionHelp">仅官方 Azure Translator Key 模式需要；免费 Edge 翻译可留空。</small>
              </label>
            </div>

            <label class="field">
              <span data-i18n="options.apiKey">API Key</span>
              <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off">
              <small data-i18n="options.apiKeyHelp">OpenAI 兼容 API 通常需要填写；Google / Microsoft 留空则走免费网页翻译通道。</small>
            </label>
          </div>
        </details>

        <label class="field provider-openai" hidden>
          <span data-i18n="options.model">Model</span>
          <input id="model" type="text" placeholder="gpt-4o-mini" autocomplete="off">
        </label>

        <div class="grid">
          <label class="field">
            <span data-i18n="options.sourceLanguage">源语言</span>
            <select id="sourceLanguageMode">
              <option value="auto" data-i18n="options.sourceModeAuto">根据字幕内容自动识别</option>
              <option value="fixed" data-i18n="options.sourceModeFixed">固定为 Teams 转写语言</option>
            </select>
            <select id="sourceLanguageSelect"></select>
            <input id="sourceLanguageCustom" class="custom-language" type="text" placeholder="例如: Japanese" autocomplete="off" hidden data-i18n-placeholder="options.sourceCustomPlaceholder">
            <small data-i18n="options.sourceHelp">自动识别会直接根据 Teams 实时字幕文本判断源语言。</small>
          </label>

          <label class="field">
            <span data-i18n="options.targetLanguage">目标语言</span>
            <select id="targetLanguageSelect"></select>
            <input id="targetLanguageCustom" class="custom-language" type="text" placeholder="例如: Simplified Chinese" autocomplete="off" hidden data-i18n-placeholder="options.targetCustomPlaceholder">
            <small data-i18n="options.targetHelp">下拉列表使用 Teams 实时翻译字幕支持的目标语言，也可以自定义。</small>
          </label>
        </div>

        <div class="grid">
          <label class="field">
            <span data-i18n="options.translationMode">翻译模式</span>
            <select id="translationMode">
              <option value="complete" data-i18n="options.translationModeComplete">整句优先</option>
              <option value="balanced" data-i18n="options.translationModeBalanced">均衡</option>
              <option value="fast" data-i18n="options.translationModeFast">极速</option>
            </select>
            <small data-i18n="options.translationModeHelp">根据源语言自动调整静默等待、增量合并和最大持有时间。</small>
          </label>

          <label class="field">
            <span data-i18n="options.maxItems">窗口保留条数</span>
            <input id="maxItems" type="number" min="5" max="100" step="1">
          </label>
        </div>

        <div class="grid">
          <label class="field">
            <span data-i18n="options.settleDelay">最小静默等待</span>
            <input id="settleDelayMs" type="number" min="500" max="6000" step="100">
            <small data-i18n="options.settleDelayHelp">单位毫秒；会作为自动调参后的下限，用来避免过早翻译半句话。</small>
          </label>

          <label class="field">
            <span data-i18n="options.minChars">最短字幕长度</span>
            <input id="minChars" type="number" min="1" max="80" step="1">
          </label>
        </div>

        <label class="field field-inline">
          <input id="processExistingOnStart" type="checkbox">
          <span data-i18n="options.processExistingOnStart">启动时翻译已有字幕</span>
        </label>

        <div class="actions">
          <button type="submit" data-i18n="options.save">保存</button>
          <button id="test" type="button" class="secondary" data-i18n="options.test">测试翻译</button>
        </div>

        <div id="message" class="message" role="status" aria-live="polite"></div>
      </form>

      <section class="update-card" aria-labelledby="updateTitle">
        <div class="update-card-header">
          <div>
            <h2 id="updateTitle" data-i18n="options.updateTitle">版本更新</h2>
            <p data-i18n="options.updateDescription">检查 GitHub 最新正式版；如有更新，可直接查看更新说明和更新指引。</p>
          </div>
          <button id="checkUpdate" type="button" class="secondary" data-i18n="options.updateCheck">检查更新</button>
        </div>

        <div class="update-meta-inline">
          <span class="update-meta-inline-item">
            <span class="update-meta-label" data-i18n="options.currentVersion">当前版本</span>
            <span class="update-meta-separator">:</span>
            <strong id="currentVersion">v1.0.3</strong>
          </span>
          <span class="update-meta-inline-item">
            <span class="update-meta-label" data-i18n="options.latestVersion">最新正式版</span>
            <span class="update-meta-separator">:</span>
            <strong id="latestVersion" data-i18n="options.updateLatestUnknown">未确认</strong>
          </span>
        </div>

        <div id="updateStatus" class="update-status" role="status" aria-live="polite"></div>

        <div class="update-links">
          <a
            id="releaseLink"
            class="button-link secondary-link"
            href="https://github.com/Amoiensis/TeamsLingo/releases/latest"
            target="_blank"
            rel="noopener"
            hidden
            data-i18n="options.updateViewRelease"
          >更新说明</a>
          <a
            id="updateGuideLink"
            class="button-link secondary-link"
            href="https://github.com/Amoiensis/TeamsLingo/blob/main/docs/UPDATE_GUIDE.md"
            target="_blank"
            rel="noopener"
            hidden
            data-i18n="options.updateViewGuide"
          >查看更新指引</a>
        </div>
      </section>

      <footer class="footer">
      <span id="footerVersion" class="footer-version">v1.0.3</span>
      <a href="https://github.com/Amoiensis/TeamsLingo" target="_blank" rel="noopener" class="footer-link">GitHub</a>
      </footer>
    </main>
    <script src="ui-i18n.js"></script>
    <script src="languages.js"></script>
    <script src="options.js"></script>
  </body>
</html>
